services:
  db-app:
    image: postgres:15
    container_name: match-db-app
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-amaury}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-footballapp_db}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amaury} -d ${DB_NAME:-footballapp_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-ml:
    image: postgres:15
    container_name: match-db-ml
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-amaury}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_ML_NAME:-footballml_db}
    volumes:
      - postgres_ml_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amaury} -d ${DB_ML_NAME:-footballml_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-app:
    build:
      context: .
      dockerfile: FastAPI_App/Dockerfile
    container_name: match-api-app
    depends_on:
      db-app:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db-app
      - DB_USER=${DB_USER:-amaury}
      - DB_NAME=${DB_NAME:-footballapp_db}
      - DATABASE_URL=postgresql://${DB_USER:-amaury}:${DB_PASSWORD:-password}@db-app:5432/${DB_NAME:-footballapp_db}
      - ML_API_URL=http://api-ml:8001

  api-ml:
    build:
      context: .
      dockerfile: FastAPI_ML/Dockerfile
    container_name: match-api-ml
    depends_on:
      db-ml:
        condition: service_healthy
    volumes:
      - ./Data:/app/Data:ro
    env_file: .env
    environment:
      - DB_HOST=db-ml
      - DB_USER=${DB_USER:-amaury}
      - DB_NAME=${DB_ML_NAME:-footballml_db}
      - DATABASE_ML_URL=postgresql://${DB_USER:-amaury}:${DB_PASSWORD:-password}@db-ml:5432/${DB_ML_NAME:-footballml_db}

  frontend:
    build:
      context: .
      dockerfile: match_prediction_app-front/Dockerfile
    container_name: match-frontend
    ports:
      - "8082:8080"
      - "8443:8443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-app
      - api-ml

volumes:
  postgres_app_data:
  postgres_ml_data:
