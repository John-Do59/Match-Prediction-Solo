services:
  db-app:
    image: postgres:15
    restart: always
    env_file: .env
    # POSTGRES_USER, PASSWORD et DB sont déjà dans le .env
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks:
      - backend-network
    environment:
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-ml:
    image: postgres:15
    restart: always
    env_file: .env
    # POSTGRES_USER, PASSWORD et DB sont déjà dans le .env
    volumes:
      - postgres_ml_data:/var/lib/postgresql/data
    networks:
      - backend-network
    environment:
      - POSTGRES_DB=${DB_ML_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-app:
    build:
      context: .
      dockerfile: FastAPI_App/Dockerfile
    image: match-prediction-app:ultra-light
    depends_on:
      db-app:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db-app
      - ML_API_URL=http://api-ml:8001
    networks:
      - frontend-network
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api-ml:
    build:
      context: .
      dockerfile: FastAPI_ML/Dockerfile
    image: match-prediction-ml:ultra-light
    depends_on:
      db-ml:
        condition: service_healthy
    volumes:
      - ./Data:/app/Data:ro
    env_file: .env
    environment:
      - DB_HOST=db-ml
    networks:
      - frontend-network
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: match_prediction_app-front/Dockerfile
    image: match-frontend:dev
    ports:
      - "8083:8080"
    environment:
      - ENV=dev
    networks:
      - frontend-network
    depends_on:
      - api-app
      - api-ml

  gateway:
    image: traefik:v2.10
    profiles: ["prod"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard Traefik
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - frontend-network

  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: match_prediction_app-front/Dockerfile
    image: match-frontend:prod
    environment:
      - ENV=prod
    networks:
      - frontend-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    depends_on:
      - api-app
      - api-ml

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge

volumes:
  postgres_app_data:
  postgres_ml_data:
