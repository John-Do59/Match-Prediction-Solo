name: Docker Build, Scan & Publish to GHCR

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # Requis pour upload Trivy SARIF

    strategy:
      matrix:
        include:
          - image_suffix: api-app
            dockerfile: FastAPI_App/Dockerfile
            context: .
          - image_suffix: api-ml
            dockerfile: FastAPI_ML/Dockerfile
            context: .
          - image_suffix: frontend
            dockerfile: match_prediction_app-front/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        # On ne login que pour les pushs (pas les PRs)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (et push si merge sur develop/main)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # On pousse uniquement sur push (pas sur PR)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache GitHub Actions pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Charger l'image localement pour le scan Trivy
          load: ${{ github.event_name == 'pull_request' }}

      # ─────────────────────────────────────────────
      # 🔐 SÉCURITÉ : Scan de vulnérabilités avec Trivy
      # ─────────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.image_suffix }}.sarif
          # Stopper le build si une CVE CRITICAL est détectée
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Uploader même si le scan a échoué
        with:
          sarif_file: trivy-${{ matrix.image_suffix }}.sarif
