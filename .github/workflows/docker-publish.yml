name: Docker Build and Publish to GHCR

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  # On récupère automatiquement le nom du repo en minuscule pour éviter les erreurs Docker
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image_suffix: api-app
            dockerfile: FastAPI_App/Dockerfile
            context: .
          - image_suffix: api-ml
            dockerfile: FastAPI_ML/Dockerfile
            context: .
          - image_suffix: frontend
            dockerfile: match_prediction_app-front/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Optimisation : Utilisation du cache GitHub Actions pour accélérer les builds futurs
          cache-from: type=gha
          cache-to: type=gha,mode=max
